name: Run commands when issues are labeled
on:
  issues:
    types: [labeled]
jobs:
  main:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Actions
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6
        with:
          repository: "grafana/grafana-github-actions"
          path: ./actions
          # Pinned to a commit SHA (grafana-github-actions has no release tags).
          # Refresh manually when the upstream actions change.
          ref: 3c62d35c5a66e730186a338e45aeb8fa784e2d56 # main as of 2026-06-26
          persist-credentials: false

      - name: Install Actions
        run: npm install --production --ignore-scripts --prefix ./actions

      - id: get-github-token
        uses: grafana/shared-workflows/actions/create-github-app-token@create-github-app-token/v0.3.1
        with:
          github_app: grafana-oss-big-tent

      - name: Run Commands
        uses: ./actions/commands
        with:
          token: ${{ steps.get-github-token.outputs.token }}
          configPath: issue_commands
