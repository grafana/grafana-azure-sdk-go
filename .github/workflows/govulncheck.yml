name: govulncheck
on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main
    # Only scan when the dependency graph changes; avoids failing unrelated
    # PRs when new advisories land in the vuln DB between dependency updates.
    paths:
      - go.mod
      - go.sum

permissions: {}

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.5.0 ./...
